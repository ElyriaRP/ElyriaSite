<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ElyriaRP | Aguardando...</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg1: #02030a;
            --bg2: #081028;
            --accent: #7fe7ff;
            --key-bg: #1a1a1a;
            --key-text: #f0f0f0;
        }

        body {
            margin: 0;
            padding: 0;
            /* Espaço reservado no rodapé para o cronômetro não sobrepor o jogo/controles */
            padding-bottom: 120px; 
            box-sizing: border-box;
            background: linear-gradient(180deg, var(--bg1), var(--bg2));
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(127, 231, 255, 0.3);
        }

        .score-board {
            font-size: 24px;
            font-family: 'VT323', monospace;
            letter-spacing: 2px;
        }

        #gameCanvas {
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(127, 231, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
        }

        /* ===== BOTÕES E CONTROLES ===== */
        .retro-key {
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 6px;
            font-family: sans-serif;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
            box-shadow: 
                inset 2px 2px 3px rgba(255, 255, 255, 0.15),
                inset -2px -3px 3px rgba(0, 0, 0, 0.9),
                3px 4px 6px rgba(0, 0, 0, 0.6);
            transition: transform 0.05s, box-shadow 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .retro-key:active {
            transform: translateY(3px);
            box-shadow: 
                inset 3px 3px 6px rgba(0, 0, 0, 0.9), 
                0px 1px 1px rgba(0, 0, 0, 0.3);
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .ctrl-btn {
            width: 50px;
            height: 50px;
            font-size: 20px;
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        @media (min-width: 768px) {
            .mobile-controls { display: none; }
        }

        /* ===== CRONÔMETRO ===== */
        .countdown-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.8));
            backdrop-filter: blur(6px);
            border-top: 1px solid rgba(127, 231, 255, 0.15);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .countdown-container {
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .countdown-title {
            font-size: 13px;
            color: rgba(127, 231, 255, 0.9);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown-timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .countdown-number {
            font-size: 42px;
            font-weight: normal;
            color: #7fe7ff;
            font-family: 'VT323', monospace;
            line-height: 1;
            text-shadow: 0 0 12px rgba(127, 231, 255, 0.4);
            min-width: 45px;
            letter-spacing: 2px;
            transform: scaleY(1.2); /* Deixa os números esticados parecidos com a imagem */
        }

        .countdown-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .countdown-separator {
            font-size: 28px;
            color: rgba(127, 231, 255, 0.4);
            margin: 0 2px;
            transform: translateY(-8px); /* Alinha os dois pontos com os números */
        }

        @media (max-width: 400px) {
            .countdown-number { font-size: 32px; min-width: 35px; }
            .countdown-label { font-size: 9px; }
            .countdown-separator { font-size: 22px; }
        }

        /* ===== EVENTO OVERLAY (HACK 30 PONTOS) ===== */
        #eventOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #eventOverlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .secret-number {
            font-family: 'VT323', monospace;
            font-size: 48px;
            color: #ff3333;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
            animation: glitch 2s infinite;
        }

        .dial-btn {
            font-size: 12px;
            padding: 16px 32px;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">COBRINHA ELYRIA</div>
        <div class="score-board">Pontos: <span id="score">0</span> / 30</div>
    </div>

    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div class="mobile-controls">
        <button class="retro-key ctrl-btn btn-up" id="btnUp">▲</button>
        <button class="retro-key ctrl-btn btn-left" id="btnLeft">◄</button>
        <button class="retro-key ctrl-btn btn-down" id="btnDown">▼</button>
        <button class="retro-key ctrl-btn btn-right" id="btnRight">►</button>
    </div>

    <div class="countdown-section">
        <div class="countdown-container">
            <div class="countdown-title">Elyria os convocará em...:</div>
            <div class="countdown-timer">
                <div class="countdown-item">
                    <div class="countdown-number" id="countdown-dias">00</div>
                    <div class="countdown-label">Dias</div>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-item">
                    <div class="countdown-number" id="countdown-horas">00</div>
                    <div class="countdown-label">Horas</div>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-item">
                    <div class="countdown-number" id="countdown-minutos">00</div>
                    <div class="countdown-label">Minutos</div>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-item">
                    <div class="countdown-number" id="countdown-segundos">00</div>
                    <div class="countdown-label">Segundos</div>
                </div>
            </div>
        </div>
    </div>

    <div id="eventOverlay">
        <div class="secret-number">(11) 97364-6987</div>
        <button class="retro-key dial-btn" onclick="window.location.href='telefone.html'">
            DISCAR NÚMERO
        </button>
    </div>

    <script>
        // ==========================================
        // LÓGICA DO CRONÔMETRO
        // ==========================================
        (function() {
            const diasEl = document.getElementById('countdown-dias');
            const horasEl = document.getElementById('countdown-horas');
            const minutosEl = document.getElementById('countdown-minutos');
            const segundosEl = document.getElementById('countdown-segundos');

            function updateCountdown() {
                // Configurado para: 30 de Maio de 2026 às 19:30
                // O mês no JS começa em 0 (Jan = 0, Fev = 1... Maio = 4)
                const targetDate = new Date(2026, 4, 30, 19, 30, 0).getTime(); 
                const now = new Date().getTime();
                const timeLeft = targetDate - now;

                if (timeLeft <= 0) {
                    diasEl.textContent = '00';
                    horasEl.textContent = '00';
                    minutosEl.textContent = '00';
                    segundosEl.textContent = '00';
                    return;
                }

                const dias = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const horas = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutos = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const segundos = Math.floor((timeLeft % (1000 * 60)) / 1000);

                diasEl.textContent = String(dias).padStart(2, '0');
                horasEl.textContent = String(horas).padStart(2, '0');
                minutosEl.textContent = String(minutos).padStart(2, '0');
                segundosEl.textContent = String(segundos).padStart(2, '0');
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        })();

        // ==========================================
        // LÓGICA DO JOGO DA COBRINHA
        // ==========================================
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const eventOverlay = document.getElementById("eventOverlay");

        const gridSize = 15;
        let tileCountX = canvas.width / gridSize;
        let tileCountY = canvas.height / gridSize;

        let snake = [];
        let snakeLength = 3;
        let headX = 10;
        let headY = 10;
        
        let velocityX = 0;
        let velocityY = 0;

        let appleX = 5;
        let appleY = 5;

        let score = 0;
        const targetScore = 30;
        let gameActive = true;

        function drawGame() {
            if (!gameActive) return;

            changeSnakePosition();
            
            let result = isGameOver();
            if (result) return;

            clearScreen();
            checkAppleCollision();
            drawApple();
            drawSnake();

            if (score >= targetScore) {
                triggerSecretEvent();
                return;
            }

            // Velocidade moderada
            setTimeout(drawGame, 1000 / 6);
        }

        function isGameOver() {
            let gameOver = false;
            if (velocityX === 0 && velocityY === 0) return false;

            if (headX < 0 || headX === tileCountX || headY < 0 || headY === tileCountY) {
                gameOver = true;
            }

            for (let i = 0; i < snake.length; i++) {
                let part = snake[i];
                if (part.x === headX && part.y === headY) {
                    gameOver = true;
                    break;
                }
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                setTimeout(resetGame, 1000);
            }
            return gameOver;
        }

        function resetGame() {
            snake = [];
            snakeLength = 3;
            score = 0;
            headX = 10;
            headY = 10;
            velocityX = 0;
            velocityY = 0;
            scoreElement.innerText = score;
            placeApple();
            drawGame();
        }

        function clearScreen() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#7fe7ff";
            for (let i = 0; i < snake.length; i++) {
                let part = snake[i];
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            }

            snake.push({ x: headX, y: headY });
            while (snake.length > snakeLength) {
                snake.shift();
            }

            ctx.fillStyle = "#5a2bd6";
            ctx.fillRect(headX * gridSize, headY * gridSize, gridSize - 2, gridSize - 2);
        }

        function changeSnakePosition() {
            headX += velocityX;
            headY += velocityY;
        }

        function drawApple() {
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(appleX * gridSize, appleY * gridSize, gridSize - 2, gridSize - 2);
        }

        function checkAppleCollision() {
            if (appleX === headX && appleY === headY) {
                placeApple();
                snakeLength++;
                score++;
                scoreElement.innerText = score;
            }
        }

        function placeApple() {
            let valid = false;
            while (!valid) {
                appleX = Math.floor(Math.random() * tileCountX);
                appleY = Math.floor(Math.random() * tileCountY);
                valid = true;
                for (let i = 0; i < snake.length; i++) {
                    if (snake[i].x === appleX && snake[i].y === appleY) {
                        valid = false;
                    }
                }
            }
        }

        function triggerSecretEvent() {
            gameActive = false;
            ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            eventOverlay.classList.add('active');
        }

        document.body.addEventListener("keydown", keyDown);

        function keyDown(event) {
            if (!gameActive) return;
            if ((event.keyCode == 38 || event.keyCode == 87) && velocityY != 1) { velocityX = 0; velocityY = -1; }
            if ((event.keyCode == 40 || event.keyCode == 83) && velocityY != -1) { velocityX = 0; velocityY = 1; }
            if ((event.keyCode == 37 || event.keyCode == 65) && velocityX != 1) { velocityX = -1; velocityY = 0; }
            if ((event.keyCode == 39 || event.keyCode == 68) && velocityX != -1) { velocityX = 1; velocityY = 0; }
        }

        document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); if(velocityY != 1) { velocityX = 0; velocityY = -1; }});
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); if(velocityY != -1) { velocityX = 0; velocityY = 1; }});
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); if(velocityX != 1) { velocityX = -1; velocityY = 0; }});
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); if(velocityX != -1) { velocityX = 1; velocityY = 0; }});
        
        document.getElementById('btnUp').addEventListener('mousedown', () => { if(velocityY != 1) { velocityX = 0; velocityY = -1; }});
        document.getElementById('btnDown').addEventListener('mousedown', () => { if(velocityY != -1) { velocityX = 0; velocityY = 1; }});
        document.getElementById('btnLeft').addEventListener('mousedown', () => { if(velocityX != 1) { velocityX = -1; velocityY = 0; }});
        document.getElementById('btnRight').addEventListener('mousedown', () => { if(velocityX != -1) { velocityX = 1; velocityY = 0; }});

        drawGame();
    </script>
</body>
</html>
